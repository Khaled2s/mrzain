<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أجزاء الجسم للأطفال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .score-board {
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .system-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease;
        }

        .system-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .system-card.active {
            background: #ffd700;
            transform: scale(1.05);
        }

        .system-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .system-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .quiz-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quiz-title {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
        }

        .question-counter {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .image-container {
            text-align: center;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .question {
            font-size: 1.5em;
            color: #333;
            margin: 20px 0;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .option {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
            text-align: center;
            font-weight: bold;
        }

        .option:hover {
            background: #e3f2fd;
            border-color: #667eea;
            transform: scale(1.02);
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            animation: correctAnswer 0.5s ease;
        }

        .option.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
            animation: wrongAnswer 0.5s ease;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .feedback {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #4caf50;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f44336;
        }

        .next-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .next-btn:hover {
            background: #5568d3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.8s ease;
        }

        .result-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result-message {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes correctAnswer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes wrongAnswer {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .systems-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            .question {
                font-size: 1.2em;
            }

            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 لعبة أجزاء الجسم للأطفال 🎮</h1>
            <div class="score-board">
                ⭐ النقاط: <span id="score">0</span>
            </div>
        </div>

        <div class="systems-grid">
            <div class="system-card" data-system="digestive">
                <div class="system-icon">🫃</div>
                <div class="system-name">الجهاز الهضمي</div>
            </div>
            <div class="system-card" data-system="respiratory">
                <div class="system-icon"></div>
                <div class="system-name">الجهاز التنفسي</div>
            </div>
            <div class="system-card" data-system="urinary">
                <div class="system-icon">🫘</div>
                <div class="system-name">جهاز الإطراح</div>
            </div>
            <div class="system-card" data-system="skeletal">
                <div class="system-icon">🦴</div>
                <div class="system-name">الهيكل العظمي</div>
            </div>
            <div class="system-card" data-system="nervous">
                <div class="system-icon">🧠</div>
                <div class="system-name">الجهاز العصبي</div>
            </div>
        </div>

        <div class="quiz-section" id="quizSection" style="display: none;">
            <div class="quiz-header">
                <div class="quiz-title" id="quizTitle">الجهاز الهضمي</div>
                <div class="question-counter">
                    السؤال <span id="currentQuestion">1</span> من <span id="totalQuestions">3</span>
                </div>
            </div>

            <div class="image-container">
                <img id="systemImage" src="" alt="صورة الجهاز">
            </div>

            <div class="question" id="questionText">ما هو هذا العضو؟</div>

            <div class="options" id="optionsContainer">
                <!-- Options will be added dynamically -->
            </div>

            <div class="feedback" id="feedback"></div>

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>السؤال التالي ➡️</button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle">أحسنت!</div>
            <div class="result-message" id="resultMessage">لقد أكملت جميع الأسئلة</div>
            <button class="restart-btn" onclick="restartQuiz()">ابدأ من جديد 🔄</button>
        </div>
    </div>

    <script>
        const systemsData = {
            digestive: {
                name: 'الجهاز الهضمي',
                image: 'https://image.qwenlm.ai/public_source/687ebcd9-a2fc-488c-bcd5-e3a439d7f552/11c00f2f8-1e0e-40c8-9159-6452231baabf.png',
                questions: [
                    {
                        question: 'ما هو العضو الذي يظهر في الصورة ويخزن الطعام ويهضمه؟',
                        options: ['القلب', 'المعدة', 'الرئة', 'الكبد'],
                        correct: 1
                    },
                    {
                        question: 'ما هي وظيفة الأمعاء الدقيقة؟',
                        options: ['ضخ الدم', 'امتصاص الغذاء', 'التنفس', 'التفكير'],
                        correct: 1
                    },
                    {
                        question: 'أي عضو يساعد في هضم الطعام عن طريق إفراز العصارات؟',
                        options: ['الكلى', 'الرئة', 'البنكرياس', 'الدماغ'],
                        correct: 2
                    }
                ]
            },
            respiratory: {
                name: 'الجهاز التنفسي',
                image: 'https://image.qwenlm.ai/public_source/687ebcd9-a2fc-488c-bcd5-e3a439d7f552/1eae45edc-3f8a-4146-87c2-a7047ace1676.png',
                questions: [
                    {
                        question: 'ما هي الأعضاء الرئيسية في الجهاز التنفسي؟',
                        options: ['المعدة والأمعاء', 'الرئتان', 'القلب والأوعية', 'الكلى'],
                        correct: 1
                    },
                    {
                        question: 'ما وظيفة القصبة الهوائية (Trachea)؟',
                        options: ['هضم الطعام', 'نقل الهواء للرئتين', 'ضخ الدم', 'التفكير'],
                        correct: 1
                    },
                    {
                        question: 'ماذا نستنشق من الهواء؟',
                        options: ['ثاني أكسيد الكربون', 'النيتروجين', 'الأكسجين', 'الهيدروجين'],
                        correct: 2
                    }
                ]
            },
            urinary: {
                name: 'جهاز الإطراح',
                image: 'https://image.qwenlm.ai/public_source/687ebcd9-a2fc-488c-bcd5-e3a439d7f552/1dc610cd2-be3f-4958-97f2-fc62bbb3996b.png',
                questions: [
                    {
                        question: 'ما هي وظيفة الكلى؟',
                        options: ['هضم الطعام', 'تنقية الدم وإنتاج البول', 'التنفس', 'التفكير'],
                        correct: 1
                    },
                    {
                        question: 'أين يتم تخزين البول قبل إخراجه من الجسم؟',
                        options: ['الكلى', 'المثانة', 'المعدة', 'الرئة'],
                        correct: 1
                    },
                    {
                        question: 'كم عدد الكلى في جسم الإنسان؟',
                        options: ['واحدة', 'اثنتان', 'ثلاث', 'أربع'],
                        correct: 1
                    }
                ]
            },
            skeletal: {
                name: 'الهيكل العظمي',
                image: 'https://image.qwenlm.ai/public_source/687ebcd9-a2fc-488c-bcd5-e3a439d7f552/1982e8a4e-c68d-4b4f-bebd-9a438e412dc8.png',
                questions: [
                    {
                        question: 'ما هي وظيفة الهيكل العظمي؟',
                        options: ['هضم الطعام', 'دعم وحماية الجسم', 'التنفس', 'التفكير'],
                        correct: 1
                    },
                    {
                        question: 'ما هو أكبر عظم في جسم الإنسان؟',
                        options: ['عظم الذراع', 'عظم الفخذ', 'الجمجمة', 'الضلوع'],
                        correct: 1
                    },
                    {
                        question: 'كم عدد العظام في جسم الإنسان البالغ؟',
                        options: ['106', '206', '306', '406'],
                        correct: 1
                    }
                ]
            },
            nervous: {
                name: 'الجهاز العصبي',
                image: 'https://image.qwenlm.ai/public_source/687ebcd9-a2fc-488c-bcd5-e3a439d7f552/1ef506459-b991-4ade-aa79-ebd3479e6b72.png',
                questions: [
                    {
                        question: 'ما هو العضو الرئيسي في الجهاز العصبي؟',
                        options: ['القلب', 'الدماغ', 'المعدة', 'الكلى'],
                        correct: 1
                    },
                    {
                        question: 'ما وظيفة الجهاز العصبي؟',
                        options: ['هضم الطعام', 'التنفس', 'التحكم في الجسم والتفكير', 'ضخ الدم'],
                        correct: 2
                    },
                    {
                        question: 'ما الذي ينقل الإشارات من الدماغ إلى باقي الجسم؟',
                        options: ['العظام', 'الأعصاب', 'العضلات', 'الجلد'],
                        correct: 1
                    }
                ]
            }
        };

        let currentSystem = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        document.querySelectorAll('.system-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.system-card').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                
                currentSystem = this.dataset.system;
                currentQuestionIndex = 0;
                answered = false;
                
                document.getElementById('quizSection').style.display = 'block';
                document.getElementById('resultSection').classList.remove('show');
                
                loadQuestion();
            });
        });

        function loadQuestion() {
            const system = systemsData[currentSystem];
            const question = system.questions[currentQuestionIndex];
            
            document.getElementById('quizTitle').textContent = system.name;
            document.getElementById('systemImage').src = system.image;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = system.questions.length;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
            document.getElementById('nextBtn').disabled = true;
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;
            
            answered = true;
            const system = systemsData[currentSystem];
            const question = system.questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            
            options.forEach(opt => opt.classList.add('disabled'));
            
            if (index === question.correct) {
                options[index].classList.add('correct');
                feedback.textContent = '✅ إجابة صحيحة! أحسنت!';
                feedback.className = 'feedback show correct';
                score += 10;
                document.getElementById('score').textContent = score;
            } else {
                options[index].classList.add('wrong');
                options[question.correct].classList.add('correct');
                feedback.textContent = '❌ إجابة خاطئة. الإجابة الصحيحة هي: ' + question.options[question.correct];
                feedback.className = 'feedback show wrong';
            }
            
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            const system = systemsData[currentSystem];
            
            if (currentQuestionIndex < system.questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('resultSection').classList.add('show');
            
            const system = systemsData[currentSystem];
            const totalQuestions = system.questions.length;
            const maxScore = totalQuestions * 10;
            const achievedScore = score;
            
            let icon, title, message;
            
            if (achievedScore === maxScore) {
                icon = '🏆';
                title = 'ممتاز!';
                message = `لقد أجبت على جميع الأسئلة بشكل صحيح! حصلت على ${achievedScore} نقطة`;
            } else if (achievedScore >= maxScore * 0.7) {
                icon = '🎉';
                title = 'أحسنت!';
                message = `أداء رائع! حصلت على ${achievedScore} من ${maxScore} نقطة`;
            } else if (achievedScore >= maxScore * 0.5) {
                icon = '👍';
                title = 'جيد!';
                message = `حصلت على ${achievedScore} من ${maxScore} نقطة. يمكنك التحسن!`;
            } else {
                icon = '💪';
                title = 'حاول مرة أخرى!';
                message = `حصلت على ${achievedScore} من ${maxScore} نقطة. لا تستسلم!`;
            }
            
            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('resultSection').classList.remove('show');
            document.querySelectorAll('.system-card').forEach(c => c.classList.remove('active'));
            document.getElementById('quizSection').style.display = 'none';
        }
    </script>
</body>
</html>
