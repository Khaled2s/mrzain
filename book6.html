<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive English Book</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cairo@4.5.10/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@4.5.10/index.min.css">
<style>
  * { font-family: 'Cairo', sans-serif; }
  .book-font { font-family: 'Playfair Display', serif; }
  
  body {
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .book-container {
    perspective: 3000px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .book {
    width: 100%;
    max-width: 1100px;
    min-height: 90vh;
    background: linear-gradient(to right, #fef9e7 0%, #fdf6e3 50%, #fef9e7 100%);
    border-radius: 20px 8px 8px 20px;
    box-shadow: 
      0 25px 50px rgba(0,0,0,0.5),
      inset 0 0 80px rgba(139, 90, 43, 0.1);
    position: relative;
    overflow: hidden;
    display: flex;
  }
  
  .book::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 30px;
    height: 100%;
    background: linear-gradient(to right, rgba(139, 90, 43, 0.3), transparent);
    pointer-events: none;
    z-index: 10;
  }
  
  .book::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 30px;
    height: 100%;
    background: linear-gradient(to left, rgba(139, 90, 43, 0.2), transparent);
    pointer-events: none;
    z-index: 10;
  }
  
  .page {
    flex: 1;
    padding: 50px 60px;
    overflow-y: auto;
    position: relative;
  }
  
  .page::-webkit-scrollbar { width: 8px; }
  .page::-webkit-scrollbar-track { background: rgba(139, 90, 43, 0.1); }
  .page::-webkit-scrollbar-thumb { background: rgba(139, 90, 43, 0.4); border-radius: 4px; }
  
  .cover-page {
    background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
    color: #fef9e7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }
  
  .cover-page::before {
    content: '';
    position: absolute;
    inset: 20px;
    border: 3px double #d4af37;
    border-radius: 4px;
    pointer-events: none;
  }
  
  .cover-page::after {
    content: '';
    position: absolute;
    inset: 35px;
    border: 1px solid #d4af37;
    border-radius: 4px;
    pointer-events: none;
  }
  
  .page-number {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #8B4513;
    font-style: italic;
  }
  
  .unit-header {
    border-bottom: 3px double #8B4513;
    padding-bottom: 15px;
    margin-bottom: 25px;
  }
  
  .reading-text {
    background: rgba(254, 249, 231, 0.7);
    border-left: 4px solid #8B4513;
    padding: 20px;
    border-radius: 4px;
    font-size: 16px;
    line-height: 1.9;
    color: #3d2817;
    box-shadow: inset 0 0 20px rgba(139, 90, 43, 0.05);
  }
  
  .exercise-card {
    background: #fff;
    border: 1px solid rgba(139, 90, 43, 0.2);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(139, 90, 43, 0.1);
    transition: all 0.3s;
  }
  
  .exercise-card:hover {
    box-shadow: 0 4px 16px rgba(139, 90, 43, 0.2);
  }
  
  .btn-answer {
    background: linear-gradient(135deg, #8B4513, #A0522D);
    color: #fef9e7;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    font-size: 14px;
    font-weight: 600;
  }
  
  .btn-answer:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(139, 90, 43, 0.4);
  }
  
  .btn-option {
    background: #fef9e7;
    border: 2px solid #8B4513;
    color: #8B4513;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 600;
    margin: 4px;
  }
  
  .btn-option:hover {
    background: #8B4513;
    color: #fef9e7;
  }
  
  .btn-option.selected {
    background: #8B4513;
    color: #fef9e7;
  }
  
  .btn-option.correct {
    background: #10b981;
    border-color: #10b981;
    color: white;
  }
  
  .btn-option.wrong {
    background: #ef4444;
    border-color: #ef4444;
    color: white;
  }
  
  .input-answer {
    border: 2px solid #8B4513;
    border-radius: 8px;
    padding: 8px 12px;
    width: 100%;
    background: #fef9e7;
    color: #3d2817;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }
  
  .input-answer:focus {
    border-color: #d4af37;
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
  }
  
  .toc-item {
    padding: 12px 20px;
    border-bottom: 1px dashed rgba(139, 90, 43, 0.3);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 4px;
  }
  
  .toc-item:hover {
    background: rgba(212, 175, 55, 0.15);
    padding-left: 30px;
  }
  
  .nav-btn {
    background: #8B4513;
    color: #fef9e7;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(139, 90, 43, 0.3);
  }
  
  .nav-btn:hover:not(:disabled) {
    background: #A0522D;
    transform: translateY(-2px);
  }
  
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .progress-bar {
    height: 8px;
    background: rgba(139, 90, 43, 0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4af37, #f59e0b);
    transition: width 0.5s;
    border-radius: 4px;
  }
  
  .fade-in {
    animation: fadeIn 0.6s ease-in;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .ornament {
    color: #d4af37;
    font-size: 24px;
    letter-spacing: 8px;
  }
  
  .score-badge {
    background: linear-gradient(135deg, #d4af37, #f59e0b);
    color: #3d2817;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  
  .feedback {
    padding: 10px 15px;
    border-radius: 8px;
    margin-top: 10px;
    font-weight: 600;
    animation: slideIn 0.3s;
  }
  
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  
  .feedback.correct {
    background: #d1fae5;
    color: #065f46;
    border-left: 4px solid #10b981;
  }
  
  .feedback.wrong {
    background: #fee2e2;
    color: #991b1b;
    border-left: 4px solid #ef4444;
  }
  
  .unit-icon {
    font-size: 48px;
    margin-bottom: 10px;
  }
  
  .chapter-title {
    font-family: 'Playfair Display', serif;
    color: #8B4513;
    font-size: 32px;
    font-weight: 700;
  }
  
  @media (max-width: 768px) {
    .book { flex-direction: column; min-height: auto; }
    .page { padding: 30px 25px; }
    .chapter-title { font-size: 24px; }
  }
</style>
</head>

// ============ State ============
let state = {
  currentPage: 'cover',
  currentUnit: 0,
  answers: {},
  showReading: {},
  score: 0,
  totalAnswered: 0
};

// ============ Statistics ============
function getStats() {
  let totalQuestions = 0;
  units.forEach(u => totalQuestions += u.exercises.length);
  let answered = Object.keys(state.answers).filter(k => state.answers[k].answered).length;
  let correct = Object.keys(state.answers).filter(k => state.answers[k].correct).length;
  return { total: totalQuestions, answered, correct };
}

// ============ Render ============
function render() {
  const app = document.getElementById('app');
  const stats = getStats();
  const progress = stats.total > 0 ? (stats.answered / stats.total) * 100 : 0;
  
  let content = '';
  
  if (state.currentPage === 'cover') {
    content = renderCover();
  } else if (state.currentPage === 'toc') {
    content = renderTOC(stats, progress);
  } else if (state.currentPage === 'unit') {
    content = renderUnit(state.currentUnit);
  }
  
  app.innerHTML = `
    <div class="book-container">
      <div class="book">
        <div class="page fade-in">
          ${content}
          <div class="page-number">${state.currentPage === 'cover' ? '—' : state.currentPage === 'toc' ? 'Table of Contents' : `Page ${state.currentUnit + 1} of ${units.length}`}</div>
        </div>
      </div>
    </div>
  `;
  
  attachEvents();
}

function renderCover() {
  return `
    <div class="cover-page" style="margin: -50px -60px; min-height: calc(90vh - 100px);">
      <div style="position: relative; z-index: 2; padding: 40px;">
        <div class="ornament">❦ ❦ ❦</div>
        <div style="font-size: 80px; margin: 20px 0;">📚</div>
        <h1 class="book-font" style="font-size: 52px; font-weight: 700; margin: 20px 0; color: #fef9e7; text-shadow: 2px 2px 8px rgba(0,0,0,0.3);">
          Interactive Book
        </h1>
        <h2 class="book-font" style="font-size: 32px; color: #d4af37; margin: 10px 0; font-style: italic;">
          English Language
        </h2>
        <div class="ornament" style="margin: 20px 0;">✦ ✦ ✦</div>
        <p style="font-size: 18px; margin: 20px 0; line-height: 1.8;">
          20 Interactive Study Units<br>
          Reading Texts • Exercises • Quizzes
        </p>
        <button onclick="goToTOC()" class="btn-answer" style="margin-top: 30px; padding: 14px 40px; font-size: 18px;">
          📖 Start Reading
        </button>
        <div style="margin-top: 40px; font-size: 14px; opacity: 0.8;">
          Basic Educational Level
        </div>
      </div>
    </div>
  `;
}

function renderTOC(stats, progress) {
  return `
    <div style="text-align: center; margin-bottom: 30px;">
      <div class="ornament">❦ ❦ ❦</div>
      <h1 class="chapter-title" style="margin: 15px 0;">Table of Contents</h1>
      <div class="ornament">✦ ✦ ✦</div>
    </div>
    
    <div style="background: rgba(139, 90, 43, 0.08); padding: 20px; border-radius: 12px; margin-bottom: 25px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; color: #8B4513;">
        <span>📊 Your Progress</span>
        <span>${stats.answered} / ${stats.total} Questions</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%;"></div>
      </div>
      <div style="display: flex; justify-content: space-around; margin-top: 15px; font-size: 14px;">
        <div><span style="color: #10b981;">✓</span> Correct: <strong>${stats.correct}</strong></div>
        <div><span style="color: #ef4444;">✗</span> Wrong: <strong>${stats.answered - stats.correct}</strong></div>
      </div>
    </div>
    
    <div style="max-height: 55vh; overflow-y: auto;">
      ${units.map((u, i) => {
        const unitAnswered = u.exercises.filter((_, idx) => state.answers[`${u.id}-${idx}`]?.answered).length;
        const unitTotal = u.exercises.length;
        const unitProgress = unitTotal > 0 ? (unitAnswered / unitTotal) * 100 : 0;
        return `
          <div class="toc-item" onclick="goToUnit(${i})">
            <div style="display: flex; align-items: center; gap: 15px;">
              <div style="font-size: 32px;">${u.icon}</div>
              <div>
                <div style="font-weight: 700; color: #8B4513; font-size: 17px;">
                  Unit ${u.id}: ${u.title}
                </div>
                <div class="progress-bar" style="width: 150px; margin-top: 5px; height: 4px;">
                  <div class="progress-fill" style="width: ${unitProgress}%;"></div>
                </div>
              </div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
              <span class="score-badge">${unitAnswered}/${unitTotal}</span>
              <span style="color: #8B4513; font-size: 20px;">→</span>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    
    <div style="text-align: center; margin-top: 25px;">
      <button onclick="goToCover()" class="nav-btn">🏠 Back to Cover</button>
    </div>
  `;
}

function renderUnit(idx) {
  const unit = units[idx];
  const readingShown = state.showReading[unit.id];
  
  let exercisesHTML = unit.exercises.map((ex, exIdx) => renderExercise(unit.id, ex, exIdx)).join('');
  
  const unitAnswered = unit.exercises.filter((_, idx) => state.answers[`${unit.id}-${idx}`]?.answered).length;
  const unitCorrect = unit.exercises.filter((_, idx) => state.answers[`${unit.id}-${idx}`]?.correct).length;
  const unitTotal = unit.exercises.length;
  
  return `
    <div style="margin-bottom: 20px;">
      <div style="text-align: center; margin-bottom: 20px;">
        <div style="font-size: 14px; color: #8B4513; font-weight: 600;">Unit ${unit.id}</div>
        <div class="unit-icon">${unit.icon}</div>
        <h1 class="chapter-title">${unit.title}</h1>
        <div class="ornament" style="margin-top: 10px;">✦ ✦ ✦</div>
      </div>
      
      <div class="unit-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 style="color: #8B4513; font-size: 22px; font-weight: 700;">📖 Reading Text</h2>
          <button onclick="toggleReading(${unit.id})" class="btn-answer" style="font-size: 13px; padding: 6px 16px;">
            ${readingShown ? '🙈 Hide Text' : '👁️ Show Text'}
          </button>
        </div>
      </div>
      
      ${readingShown ? `
        <div class="reading-text book-font" style="margin-bottom: 30px;">
          ${unit.reading}
        </div>
      ` : ''}
      
      <div style="background: rgba(212, 175, 55, 0.15); padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-weight: 700; color: #8B4513;">✏️ Interactive Exercises</div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <span class="score-badge">✓ ${unitCorrect} / ${unitTotal}</span>
          <div class="progress-bar" style="width: 100px;">
            <div class="progress-fill" style="width: ${(unitAnswered/unitTotal)*100}%;"></div>
          </div>
        </div>
      </div>
      
      ${exercisesHTML}
      
      <div style="display: flex; justify-content: space-between; margin-top: 30px; gap: 10px;">
        <button onclick="goToUnit(${idx - 1})" class="nav-btn" ${idx === 0 ? 'disabled' : ''}>
          ← Previous Unit
        </button>
        <button onclick="goToTOC()" class="nav-btn" style="background: #d4af37; color: #3d2817;">
          📋 Contents
        </button>
        <button onclick="goToUnit(${idx + 1})" class="nav-btn" ${idx === units.length - 1 ? 'disabled' : ''}>
          Next Unit →
        </button>
      </div>
    </div>
  `;
}

function renderExercise(unitId, ex, exIdx) {
  const key = `${unitId}-${exIdx}`;
  const answer = state.answers[key];
  const answered = answer?.answered;
  
  let inputHTML = '';
  let feedbackHTML = '';
  
  if (ex.type === 'true_false') {
    inputHTML = `
      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="btn-option ${answered && answer.userAnswer === 'True' ? (answer.correct ? 'correct' : 'wrong') : ''}" 
                onclick="answerQuestion('${key}', 'True', '${ex.a}')" ${answered ? 'disabled' : ''}>
          ✅ True
        </button>
        <button class="btn-option ${answered && answer.userAnswer === 'False' ? (answer.correct ? 'correct' : 'wrong') : ''}" 
                onclick="answerQuestion('${key}', 'False', '${ex.a}')" ${answered ? 'disabled' : ''}>
          ❌ False
        </button>
      </div>
    `;
  } else if (ex.type === 'multiple_choice') {
    inputHTML = `
      <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;">
        ${ex.opts.map(opt => {
          const isSelected = answered && answer.userAnswer === opt;
          const isCorrectOpt = opt === ex.a;
          let cls = 'btn-option';
          if (answered) {
            if (isSelected && isCorrectOpt) cls += ' correct';
            else if (isSelected && !isCorrectOpt) cls += ' wrong';
            else if (isCorrectOpt) cls += ' correct';
          }
          return `<button class="${cls}" onclick="answerQuestion('${key}', '${opt.replace(/'/g, "\\'")}', '${ex.a.replace(/'/g, "\\'")}')" ${answered ? 'disabled' : ''}>${opt}</button>`;
        }).join('')}
      </div>
    `;
  } else if (ex.type === 'fill_blank' || ex.type === 'riddle' || ex.type === 'pronouns') {
    inputHTML = `
      <div style="display: flex; gap: 10px; margin-top: 10px; align-items: center;">
        <input type="text" class="input-answer" id="input-${key}" placeholder="Type your answer here..." ${answered ? 'disabled' : ''} style="flex: 1;">
        <button class="btn-answer" onclick="checkTextAnswer('${key}', '${ex.a.replace(/'/g, "\\'")}')" ${answered ? 'disabled' : ''}>
          Check ✓
        </button>
      </div>
    `;
  } else if (ex.type === 'classification') {
    inputHTML = `
      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="btn-option ${answered && answer.userAnswer === 'Fact' ? (answer.correct ? 'correct' : 'wrong') : ''}" 
                onclick="answerQuestion('${key}', 'Fact', '${ex.a}')" ${answered ? 'disabled' : ''}>
          📊 Fact
        </button>
        <button class="btn-option ${answered && answer.userAnswer === 'Opinion' ? (answer.correct ? 'correct' : 'wrong') : ''}" 
                onclick="answerQuestion('${key}', 'Opinion', '${ex.a}')" ${answered ? 'disabled' : ''}>
          💭 Opinion
        </button>
      </div>
    `;
  }
  
  if (answered) {
    feedbackHTML = `
      <div class="feedback ${answer.correct ? 'correct' : 'wrong'}">
        ${answer.correct ? '✅ Correct! Well done' : `❌ Wrong. The correct answer is: <strong>${ex.a}</strong>`}
      </div>
    `;
  }
  
  const typeLabels = {
    'true_false': '✅ True or False',
    'multiple_choice': '🎯 Choose the correct answer',
    'fill_blank': '✍️ Fill in the blank',
    'riddle': '🧩 Riddle - Who am I?',
    'pronouns': '🔄 Rewrite using pronouns',
    'classification': '📊 Classify the sentence'
  };
  
  return `
    <div class="exercise-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="background: #8B4513; color: #fef9e7; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;">
          ${typeLabels[ex.type] || 'Exercise'}
        </span>
        ${answered ? `<span class="score-badge">${answer.correct ? '✓ +1' : '✗ 0'}</span>` : ''}
      </div>
      <div style="font-size: 16px; color: #3d2817; line-height: 1.7; margin-bottom: 10px;">
        <strong style="color: #8B4513;">Question:</strong> ${ex.q}
      </div>
      ${inputHTML}
      ${feedbackHTML}
    </div>
  `;
}

// ============ Events ============
function attachEvents() {
  // Nothing needed for now
}

function goToCover() {
  state.currentPage = 'cover';
  render();
  window.scrollTo(0, 0);
}

function goToTOC() {
  state.currentPage = 'toc';
  render();
  window.scrollTo(0, 0);
}

function goToUnit(idx) {
  if (idx < 0 || idx >= units.length) return;
  state.currentPage = 'unit';
  state.currentUnit = idx;
  render();
  window.scrollTo(0, 0);
}

function toggleReading(unitId) {
  state.showReading[unitId] = !state.showReading[unitId];
  render();
}

function answerQuestion(key, userAnswer, correctAnswer) {
  const isCorrect = userAnswer === correctAnswer;
  state.answers[key] = {
    answered: true,
    correct: isCorrect,
    userAnswer: userAnswer
  };
  render();
}

function checkTextAnswer(key, correctAnswer) {
  const input = document.getElementById(`input-${key}`);
  if (!input) return;
  const userAnswer = input.value.trim();
  if (!userAnswer) {
    input.style.borderColor = '#ef4444';
    return;
  }
  const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase() ||
                    correctAnswer.toLowerCase().includes(userAnswer.toLowerCase()) ||
                    userAnswer.toLowerCase().includes(correctAnswer.toLowerCase());
  state.answers[key] = {
    answered: true,
    correct: isCorrect,
    userAnswer: userAnswer
  };
  render();
}

// ============ Start ============
render();
</script>

</body>
</html>
